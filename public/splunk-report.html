<!DOCTYPE html>
<html>
<head>
    <title>Splunk Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; background: #075E54; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .report-box { background: white; padding: 60px 40px; border-radius: 10px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); text-align: center; max-width: 500px; }
        .report-box h1 { color: #ff6b6b; font-size: 32px; margin: 0 0 20px 0; }
        .report-box p { color: #333; font-size: 18px; margin: 15px 0; }
        .report-box a { display: inline-block; margin-top: 30px; padding: 12px 30px; background: #075E54; color: white; text-decoration: none; border-radius: 5px; font-size: 16px; }
        .report-box a:hover { background: #054738; }
    </style>
</head>
<body>

<div class="report-box">
    <h1>⚠️ Splunk Report Not Ready Yet</h1>
    <p>The requested report is currently unavailable.</p>
    <p>Please try again later or contact your administrator.</p>
    <a href="/">← Back to Login</a>
</div>

</body>
</html>
