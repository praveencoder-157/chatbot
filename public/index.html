<!DOCTYPE html>
<html>
<head>
    <title>Private Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; background: #ece5dd; margin: 0; }
        header { background: #075E54; color: white; padding: 15px; text-align: center; }
        #chat-container { display: flex; flex-direction: column; height: 90vh; }
        #messages { list-style: none; padding: 10px; margin: 0; overflow-y: auto; flex: 1; }
        li { padding: 10px; margin: 5px 0; background: #dcf8c6; border-radius: 8px; max-width: 70%; }
        #input-area { display: flex; padding: 10px; background: #f0f0f0; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; }
        button { margin-left: 10px; padding: 10px; border: none; background: #25D366; color: white; border-radius: 20px; }
    </style>
</head>
<body>

<header>💬 Private Chat</header>

<div id="chat-container">
    <ul id="messages"></ul>

    <div id="input-area">
        <input id="input" placeholder="Type message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const messagesList = document.getElementById("messages");

    socket.on("load messages", function(messages) {
        messagesList.innerHTML = "";
        messages.forEach(msg => addMessage(msg.text));
        scrollBottom();
    });

    socket.on("chat message", function(msg) {
        addMessage(msg);
        scrollBottom();
    });

    function addMessage(text) {
        const li = document.createElement("li");
        li.textContent = text;
        messagesList.appendChild(li);
    }

    function sendMessage() {
        const input = document.getElementById("input");
        if (input.value.trim() !== "") {
            socket.emit("chat message", input.value);
            input.value = "";
        }
    }

    document.getElementById("input").addEventListener("keypress", function(e) {
        if (e.key === "Enter") sendMessage();
    });

    function scrollBottom() {
        messagesList.scrollTop = messagesList.scrollHeight;
    }
</script>

</body>
</html>

<script src="/socket.io/socket.io.js"></script>

<script>
    const socket = io();
    const messagesList = document.getElementById("messages");

    // 🔹 Load old messages from MongoDB
    socket.on("load messages", function(messages) {
        messagesList.innerHTML = ""; // clear existing

        messages.forEach(msg => {
            addMessage(msg.text);
        });

        scrollToBottom();
    });

    // 🔹 Receive new message
    socket.on("chat message", function(msg) {
        addMessage(msg);
        scrollToBottom();
    });

    // 🔹 Add message to UI
    function addMessage(text) {
        const li = document.createElement("li");
        li.textContent = text;
        messagesList.appendChild(li);
    }

    // 🔹 Send message
    function sendMessage() {
        const input = document.getElementById("input");

        if (input.value.trim() !== "") {
            socket.emit("chat message", input.value);
            input.value = "";
        }
    }

    // 🔹 Enter key support
    document.getElementById("input").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });

    // 🔹 Auto scroll
    function scrollToBottom() {
        messagesList.scrollTop = messagesList.scrollHeight;
    }
</script>
