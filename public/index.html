<!DOCTYPE html>
<html>
<head>
    <title>Splunk Bot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #ece5dd; }
        
        /* Mobile First - Default */
        #login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #075E54; padding: 20px; }
        .login-box { background: white; padding: 30px 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 350px; }
        .login-box h1 { color: #075E54; font-size: 24px; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        .login-box button { width: 100%; padding: 12px; background: #075E54; border: none; color: white; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .login-box button:hover { background: #054738; }
        
        #chat-section { display: none; height: 100vh; display: flex; flex-direction: column; }
        header { background: #075E54; color: white; padding: 15px; text-align: center; display: flex; justify-content: space-between; align-items: center; font-size: 18px; font-weight: bold; }
        .logout-btn { background: #ff6b6b; padding: 8px 12px; border: none; color: white; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .logout-btn:hover { background: #ff5252; }
        
        #chat-container { display: flex; flex-direction: column; flex: 1; }
        #messages { list-style: none; padding: 10px; margin: 0; overflow-y: auto; flex: 1; display: flex; flex-direction: column; }
        li { padding: 10px 12px; margin: 5px; border-radius: 8px; word-wrap: break-word; max-width: 85%; font-size: 14px; }
        .sender { background: #dcf8c6; margin-left: auto; margin-right: 0; text-align: right; }
        .receiver { background: #e1f5fe; margin-right: auto; margin-left: 0; text-align: left; }
        
        #input-area { display: flex; gap: 8px; padding: 10px; background: #f0f0f0; flex-wrap: wrap; }
        #input { flex: 1; min-width: 150px; padding: 10px; border-radius: 20px; border: 1px solid #ccc; font-size: 14px; }
        .btn-send { padding: 10px 15px; border: none; background: #25D366; color: white; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .btn-send:hover { background: #20ba5a; }
        .btn-cleanse { padding: 10px 15px; border: none; background: #ff6b6b; color: white; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .btn-cleanse:hover { background: #ff5252; }

        /* Tablet - 768px and above */
        @media (min-width: 768px) {
            .login-box { max-width: 450px; padding: 40px 30px; }
            .login-box h1 { font-size: 28px; }
            .login-box input { padding: 14px; font-size: 16px; }
            #chat-section { height: 100vh; }
            li { max-width: 60%; font-size: 15px; }
            header { font-size: 20px; }
            #input { min-width: 200px; }
        }

        /* Desktop - 1024px and above */
        @media (min-width: 1024px) {
            #login-container { min-height: 100vh; }
            .login-box { max-width: 500px; padding: 50px 40px; }
            .login-box h1 { font-size: 32px; margin-bottom: 30px; }
            .login-box input { padding: 15px; margin: 15px 0; font-size: 16px; }
            .login-box button { padding: 15px; font-size: 18px; }
            #chat-section { height: 100vh; }
            li { max-width: 50%; font-size: 16px; }
            header { font-size: 22px; padding: 20px; }
            .logout-btn { padding: 10px 20px; font-size: 16px; }
            #input { min-width: 300px; padding: 12px; font-size: 16px; }
            .btn-send, .btn-cleanse { padding: 12px 20px; font-size: 16px; }
        }
    </style>
</head>
<body>

<div id="login-container">
    <div class="login-box">
        <h1>🔐 Splunk Bot</h1>
        <input id="username" type="text" placeholder="Username" />
        <input id="password" type="password" placeholder="Password" />
        <button onclick="handleLogin()">Login</button>
    </div>
</div>

<div id="chat-section">
    <header>
        <span>💬 Splunk Bot</span>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </header>

    <div id="chat-container">
        <ul id="messages"></ul>
        <div id="input-area">
            <input id="input" placeholder="Type message..." />
            <button class="btn-send" onclick="sendMessage()">Send</button>
            <button class="btn-cleanse" onclick="deleteHistory()">Cleanse</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let socket = null;
    let currentUser = null;
    let inactivityTimeout = null;
    let visibilityChangeTimeout = null;
    const INACTIVITY_DURATION = 2 * 60 * 1000; // 2 minutes

    // ✅ LOGIN HANDLER
    function handleLogin() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        if (!username || !password) {
            alert("Please enter username and password");
            return;
        }

        fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                currentUser = username;
                document.getElementById("login-container").style.display = "none";
                document.getElementById("chat-section").style.display = "flex";
                initializeSocket();
                startInactivityTimer();
                startVisibilityMonitoring();
            } else {
                window.location.href = "/splunk-report.html";
            }
        })
        .catch(err => {
            console.error("Login error:", err);
            window.location.href = "/splunk-report.html";
        });
    }

    // ✅ LOGOUT HANDLER
    function handleLogout() {
        if (socket) socket.disconnect();
        currentUser = null;
        clearInactivityTimer();
        clearVisibilityMonitoring();
        document.getElementById("login-container").style.display = "flex";
        document.getElementById("chat-section").style.display = "none";
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
        document.getElementById("messages").innerHTML = "";
    }

    // ✅ START INACTIVITY TIMER
    function startInactivityTimer() {
        resetInactivityTimer();
        document.addEventListener("mousemove", resetInactivityTimer);
        document.addEventListener("keypress", resetInactivityTimer);
        document.addEventListener("click", resetInactivityTimer);
        document.addEventListener("scroll", resetInactivityTimer);
        document.addEventListener("touchstart", resetInactivityTimer);
    }

    // ✅ RESET INACTIVITY TIMER
    function resetInactivityTimer() {
        clearTimeout(inactivityTimeout);
        inactivityTimeout = setTimeout(() => {
            autoLogout();
        }, INACTIVITY_DURATION);
    }

    // ✅ CLEAR INACTIVITY TIMER
    function clearInactivityTimer() {
        clearTimeout(inactivityTimeout);
        document.removeEventListener("mousemove", resetInactivityTimer);
        document.removeEventListener("keypress", resetInactivityTimer);
        document.removeEventListener("click", resetInactivityTimer);
        document.removeEventListener("scroll", resetInactivityTimer);
        document.removeEventListener("touchstart", resetInactivityTimer);
    }

    // ✅ MONITOR PAGE VISIBILITY (Mobile screen lock/inactive)
    function startVisibilityMonitoring() {
        document.addEventListener("visibilitychange", handleVisibilityChange);
        window.addEventListener("pagehide", handleVisibilityChange);
        window.addEventListener("blur", handleVisibilityChange);
    }

    // ✅ CLEAR VISIBILITY MONITORING
    function clearVisibilityMonitoring() {
        document.removeEventListener("visibilitychange", handleVisibilityChange);
        window.removeEventListener("pagehide", handleVisibilityChange);
        window.removeEventListener("blur", handleVisibilityChange);
    }

    // ✅ HANDLE VISIBILITY CHANGE (Mobile screen lock detection)
    function handleVisibilityChange() {
        if (document.hidden || document.visibilityState === 'hidden') {
            clearTimeout(visibilityChangeTimeout);
            visibilityChangeTimeout = setTimeout(() => {
                if (currentUser) {
                    autoLogout();
                }
            }, 30000); // 30 seconds after screen lock to confirm
        } else if (document.visibilityState === 'visible') {
            clearTimeout(visibilityChangeTimeout);
        }
    }

    // ✅ AUTO LOGOUT WITHOUT NOTIFICATION
    function autoLogout() {
        if (socket) socket.disconnect();
        currentUser = null;
        clearInactivityTimer();
        clearVisibilityMonitoring();
        window.location.href = "/splunk-report.html";
    }

    // ✅ INITIALIZE SOCKET
    function initializeSocket() {
        socket = io({
            transports: ["websocket"],
            query: { username: currentUser }
        });

        socket.on("load messages", function(messages) {
            messages.forEach(msg => {
                addMessage(msg.text, msg.sender);
            });
        });

        socket.on("connect", () => {
            console.log("✅ Connected:", socket.id);
        });

        socket.on("chat message", function(msg) {
            addMessage(msg.text, msg.sender);
        });

        socket.on("disconnect", () => {
            console.log("❌ Disconnected");
        });
    }

    // ✅ ADD MESSAGE WITH ALIGNMENT
    function addMessage(text, sender) {
        const li = document.createElement("li");
        li.textContent = text;
        li.className = (sender === currentUser) ? "sender" : "receiver";
        document.getElementById("messages").appendChild(li);
        document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
    }

    // ✅ SEND MESSAGE
    function sendMessage() {
        const input = document.getElementById("input");
        if (input.value.trim() !== "") {
            socket.emit("chat message", {
                text: input.value,
                sender: currentUser
            });
            input.value = "";
            resetInactivityTimer();
        }
    }

    // ✅ DELETE CHAT HISTORY (Cleanse)
    function deleteHistory() {
        if (confirm("Are you sure you want to cleanse all chat history? This cannot be undone.")) {
            fetch("/api/delete-history", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: currentUser })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById("messages").innerHTML = "";
                    socket.emit("history deleted");
                    resetInactivityTimer();
                }
            })
            .catch(err => console.error("Delete error:", err));
        }
    }

    // Enter key support
    document.addEventListener("keypress", function(e) {
        if (e.key === "Enter" && e.target.id === "input") {
            sendMessage();
        }
    });
</script>

</body>
</html>
