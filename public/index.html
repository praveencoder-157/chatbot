<!DOCTYPE html>

<html>
<head>
    <title>Chat Bot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

```
<style>
    body { font-family: Arial; background: #ece5dd; margin: 0; }
    header { background: #075E54; color: white; padding: 15px; text-align: center; }
    #chat-container { display: flex; flex-direction: column; height: 90vh; }
    #messages { list-style: none; padding: 10px; margin: 0; overflow-y: auto; flex: 1; }
    li { padding: 10px; margin: 5px 0; background: #dcf8c6; border-radius: 8px; max-width: 70%; }
    #input-area { display: flex; padding: 10px; background: #f0f0f0; }
    input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; }

</style>
```

</head>

<body>

<header>💬 Private Chat</header>

<div id="chat-container">
    <ul id="messages"></ul>

```
<div id="input-area">
    <input id="input" placeholder="Type message..." />
    <button onclick="sendMessage()">Send</button>
</div>
```

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
    const socket = io({
        transports: ["websocket"]   // IMPORTANT FIX
    });

    const messagesList = document.getElementById("messages");

    socket.on("load messages", function(messages) {
        messages.forEach(msg => {
            addMessage(msg.text);
        });
    });

    // ✅ CONFIRM CONNECTION
    socket.on("connect", () => {
        console.log("✅ Connected:", socket.id);
    });

    // ✅ RECEIVE MESSAGE
    socket.on("chat message", function(msg) {
        console.log("📩 Received:", msg);
        addMessage(msg);
    });

    // ✅ ADD MESSAGE TO UI
    function addMessage(text) {
        const li = document.createElement("li");
        li.textContent = text;
        messagesList.appendChild(li);
        messagesList.scrollTop = messagesList.scrollHeight;
    }

    // ✅ SEND MESSAGE
    function sendMessage() {
        const input = document.getElementById("input");

        if (input.value.trim() !== "") {
            console.log("📤 Sending:", input.value);
            socket.emit("chat message", input.value);
            input.value = "";
        }
    }

    // Enter key support
    document.getElementById("input").addEventListener("keypress", function(e) {
        if (e.key === "Enter") sendMessage();
    });
</script>

</body>
</html>
